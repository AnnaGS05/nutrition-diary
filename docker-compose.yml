version: "3.9"

services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      APP_NAME: NutriLog
      HOST: 0.0.0.0
      PORT: 8000
      DEBUG: "true"
      SECRET_KEY: docker-secret-key
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: nutrition
      DB_USER: postgres
      DB_PASSWORD: postgres
      REDIS_HOST: redis
      REDIS_PORT: 6379
      RELEASE_VERSION: local
      ENVIRONMENT: dev
      CORS_ORIGINS: http://localhost:5173,http://localhost:3000
    depends_on:
      - db
      - redis

  frontend:
    build: ./frontend
    ports:
      - "5173:5173"
    environment:
      VITE_API_URL: http://localhost:8000
    depends_on:
      - backend

  db:
    image: postgres:15
    environment:
      POSTGRES_DB: nutrition
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"

  redis:
    image: redis:7
    ports:
      - "6379:6379"

volumes:
  postgres_data: