version: "3.9"

services:
  app:
    build: .
    ports:
      - "8000-8002:8000"
    environment:
      APP_NAME: NutriLog
      HOST: 0.0.0.0
      PORT: 8000
      DEBUG: "true"
      SECRET_KEY: docker-secret-key
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: nutrition
      DB_USER: postgres
      DB_PASSWORD: postgres
    depends_on:
      - db

  db:
    image: postgres:15
    environment:
      POSTGRES_DB: nutrition
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"

volumes:
  postgres_data: