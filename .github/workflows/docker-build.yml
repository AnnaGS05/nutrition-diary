name: Build and Push Docker Image

on:
  push:
    branches:
      - main

env:
  IMAGE_NAME: nutrition-diary

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract short commit SHA
        id: vars
        run: echo "sha_short=${GITHUB_SHA::7}" >> $GITHUB_OUTPUT

      - name: Build Docker image
        run: |
          docker build \
            -t ghcr.io/${{ github.repository_owner }}/nutrition-diary:${{ steps.vars.outputs.sha_short }} \
            -t ghcr.io/${{ github.repository_owner }}/nutrition-diary:latest \
            .

      - name: Push Docker image
        run: |
          docker push ghcr.io/${{ github.repository_owner }}/nutrition-diary:${{ steps.vars.outputs.sha_short }}
          docker push ghcr.io/${{ github.repository_owner }}/nutrition-diary:latest