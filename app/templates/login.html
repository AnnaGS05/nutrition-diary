<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход — NutriLog</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

<div class="page">

    <section class="card auth-page">

        <h2>Вход</h2>

        <input id="loginUsername" placeholder="Логин">

        <input id="loginPassword" type="password" placeholder="Пароль">

        <button onclick="loginUser()">
            Войти
        </button>

        <p id="authMessage" class="message"></p>

        <p>
            Нет аккаунта?
            <a href="/register">Зарегистрироваться</a>
        </p>

        <p>
            <a href="/">На главную</a>
        </p>

    </section>

</div>

<script src="/static/script.js"></script>

</body>
</html>
