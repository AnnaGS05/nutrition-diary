<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NutriLog — дневник питания</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
<div class="page">
    <header class="hero">
        <div class="hero-topbar">
            <a id="profileBtn" href="/profile" class="hero-auth-btn secondary hidden">
                Профиль
            </a>

            <a id="authToggleBtn" href="/login" class="hero-auth-btn primary">
                Войти
            </a>

            <button id="logoutBtn" class="hero-auth-btn secondary hidden" onclick="logoutUser()">
                Выйти
            </button>
        </div>

        <div class="hero-content">
            <div>
                <h1>NutriLog</h1>
                <p>Персональный дневник питания с анализом КБЖУ и статистикой</p>
                <div class="hero-badges">
                    <span>Контроль КБЖУ</span>
                    <span>История питания</span>
                    <span>Умная аналитика</span>
                </div>
            </div>
            <img src="/static/hero.png" alt="Hero">
        </div>
    </header>

    <main>
        <section class="card">
            <h2>Добавить запись питания</h2>

            <div class="date-row">
                <label for="entryDate">Дата дневника:</label>
                <input id="entryDate" type="date">
            </div>

            <div class="form-grid">
                <input id="entryName" placeholder="Название блюда">
                <input id="entryProteins" type="number" placeholder="Белки">
                <input id="entryFats" type="number" placeholder="Жиры">
                <input id="entryCarbs" type="number" placeholder="Углеводы">
                <input id="entryCalories" type="number" placeholder="Калории">
            </div>

            <button onclick="addEntry()">Добавить запись</button>
            <p id="entryMessage" class="message"></p>
        </section>

        <section class="stats">
            <div class="stat-card">
                <span>Белки</span>
                <strong id="totalProteins">0</strong>
            </div>
            <div class="stat-card">
                <span>Жиры</span>
                <strong id="totalFats">0</strong>
            </div>
            <div class="stat-card">
                <span>Углеводы</span>
                <strong id="totalCarbs">0</strong>
            </div>
            <div class="stat-card">
                <span>Калории</span>
                <strong id="totalCalories">0</strong>
            </div>
        </section>

        <section class="card">
            <h2>Мои записи</h2>
            <div id="entriesList" class="entries">
                <p>Для просмотра записей необходимо войти в систему</p>
            </div>
        </section>
    </main>
</div>

<script src="/static/script.js"></script>
</body>
</html>
