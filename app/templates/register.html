<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Регистрация — NutriLog</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
<div class="page">
    <section class="card auth-page">
        <h1>NutriLog</h1>
        <h2>Создать аккаунт</h2>

        <input id="registerUsername" type="text" placeholder="Придумайте логин">
        <input id="registerPassword" type="password" placeholder="Придумайте пароль">

        <button onclick="registerUser()">Зарегистрироваться</button>

        <p id="authMessage" class="message"></p>

        <div class="auth-links">
            <p>Уже есть аккаунт? <a href="/login">Войти</a></p>
            <p><a href="/">На главную</a></p>
        </div>
    </section>
</div>

<script src="/static/script.js"></script>
</body>
</html>
