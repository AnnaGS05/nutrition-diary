<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Профиль — NutriLog</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
<div class="page">
    <nav class="navbar">
        <a href="/" class="logo-text">NutriLog</a>
        <div class="nav-actions">
            <a href="/">Дневник</a>
            <a href="/stats">Статистика</a>
            <button onclick="logoutUser()">Выйти</button>
        </div>
    </nav>

    <section class="card">
        <h2>Профиль пользователя</h2>

        <div class="profile-grid">
            <div>
                <label for="profileAge">Возраст</label>
                <input id="profileAge" type="number" placeholder="Возраст">
            </div>

            <div>
                <label for="profileHeight">Рост, см</label>
                <input id="profileHeight" type="number" placeholder="Рост">
            </div>

            <div>
                <label for="profileWeight">Вес, кг</label>
                <input id="profileWeight" type="number" placeholder="Вес">
            </div>

            <div>
                <label for="profileGender">Пол</label>
                <select id="profileGender">
                    <option value="male">Мужской</option>
                    <option value="female">Женский</option>
                </select>
            </div>

            <div>
                <label for="profileActivity">Активность</label>
                <select id="profileActivity">
                    <option value="1.2">Минимальная</option>
                    <option value="1.375">Лёгкая</option>
                    <option value="1.55">Средняя</option>
                    <option value="1.725">Высокая</option>
                </select>
            </div>

            <div>
                <label for="profileGoal">Цель</label>
                <select id="profileGoal">
                    <option value="loss">Похудение</option>
                    <option value="maintain">Поддержание веса</option>
                    <option value="gain">Набор массы</option>
                </select>
            </div>
        </div>

        <button onclick="saveProfile()">Сохранить профиль</button>
        <p id="profileMessage" class="message"></p>
    </section>

    <section class="stats">
        <div class="stat-card">
            <span>Норма белков</span>
            <strong id="normProteins">0</strong>
        </div>
        <div class="stat-card">
            <span>Норма жиров</span>
            <strong id="normFats">0</strong>
        </div>
        <div class="stat-card">
            <span>Норма углеводов</span>
            <strong id="normCarbs">0</strong>
        </div>
        <div class="stat-card">
            <span>Норма калорий</span>
            <strong id="normCalories">0</strong>
        </div>
    </section>
</div>

<script src="/static/script.js"></script>
</body>
</html>
